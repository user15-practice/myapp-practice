name: Deploy to Home Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: telcation.f5.si
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 30s
          script: |
            sudo -u student01 git -C /home/student01/myapp fetch
            sudo -u student01 git -C /home/student01/myapp reset --hard origin/main
            sudo -u student01 pip3 install -r /home/student01/myapp/requirements.txt --break-system-packages
            sudo pkill -u student01 -f 'python3 app.py' || true
            sleep 2
            sudo -u student01 bash -c 'nohup python3 /home/student01/myapp/app.py > /home/student01/myapp/app.log 2>&1 & disown'
