name: Deploy to Home Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: telcation.f5.si
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/student01/myapp
            sudo -u student01 git clone https://github.com/${{ github.repository }} . 2>/dev/null || (sudo -u student01 git fetch && sudo -u student01 git reset --hard origin/main)
            sudo -u student01 pip3 install -r requirements.txt --break-system-packages
            sudo pkill -u student01 -f 'python3 app.py' || true
            sudo -u student01 nohup python3 /home/student01/myapp/app.py > /home/student01/myapp/app.log 2>&1 &
